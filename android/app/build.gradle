plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Release imzalama bilgileri android/key.properties'ten okunur (repoya girmez).
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.erensuner.habit_tracker"
    // sentry_flutter + androidx.core 1.18 en az SDK 36'ya derlenmeyi sart kosuyor
    // (compileSdk yalnizca derleme; targetSdk/minSdk degismedi).
    compileSdk = 36
    // Eklentilerin (sentry_flutter, connectivity_plus vb.) istedigi NDK.
    ndkVersion = "27.0.12077973"

    compileOptions {
        // flutter_local_notifications icin gerekli: eski Android surumlerinde
        // yeni Java API'lerini kullanabilmek icin "desugaring" acik olmali.
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.erensuner.habit_tracker"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // supabase_flutter -> passkeys_android en az Android 23 (6.0) istiyor.
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties["keyAlias"]
            keyPassword keystoreProperties["keyPassword"]
            storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
            storePassword keystoreProperties["storePassword"]
        }
    }

    buildTypes {
        release {
            // Kendi upload anahtarimizla imzala (key.properties yoksa debug'a duser).
            signingConfig = keystorePropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
            // Kod kucultme + kullanilmayan kaynaklari atma + gizleme (R8).
            minifyEnabled = true
            shrinkResources = true
            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro"
            )
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // flutter_local_notifications icin desugaring kutuphanesi.
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
